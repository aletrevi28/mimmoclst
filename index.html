<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIMMOCLST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #f2f2f2;
      --gray-1: #111111;
      --gray-2: #222222;
      --gray-3: #444444;
      --gray-4: #666666;
      --gray-5: #999999;
      --gray-6: #cccccc;
      --font: 'IBM Plex Mono', monospace;
      --font-alt: 'Share Tech Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font);
      font-weight: 300;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* SCANLINES */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.012) 2px,
        rgba(255,255,255,0.012) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* HERO */
    .hero {
      display: grid;
      grid-template-rows: 1fr auto;
      border-bottom: 1px solid var(--gray-2);
    }
    .hero-main {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem 2rem 2rem;
    }
    .hero-headline {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      flex-wrap: nowrap;
    }
    .hero-title {
      font-family: var(--font-alt);
      font-size: clamp(2.8rem, 9.5vw, 9.5rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.06em;
      color: var(--gray-3);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .hero-by {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--gray-4);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--gray-2);
    }
    .hero-meta-item {
      padding: 1.5rem 2rem;
      border-right: 1px solid var(--gray-2);
    }
    .hero-meta-item:last-child { border-right: none; }
    .meta-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gray-4);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .meta-value {
      font-size: 12px;
      color: var(--gray-5);
      letter-spacing: 0.05em;
    }
    .typewriter {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 1px solid var(--gray-4);
      animation: typing 1.5s steps(6, end) 0.5s forwards, blink 0.75s step-end infinite;
      width: 0;
    }
    @keyframes typing { from { width: 0; } to { width: 6ch; } }
    @keyframes blink { 50% { border-color: transparent; } }

    /* SECTIONS */
    section { border-bottom: 1px solid var(--gray-2); }
    .section-header {
      display: grid;
      grid-template-columns: 200px 1fr;
      border-bottom: 1px solid var(--gray-2);
    }
    .section-index {
      padding: 1.2rem 2rem;
      border-right: 1px solid var(--gray-2);
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gray-3);
      text-transform: uppercase;
      display: flex;
      align-items: center;
    }
    .section-title {
      padding: 1.2rem 2rem;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--gray-5);
      text-transform: uppercase;
      display: flex;
      align-items: center;
    }

    /* FEED */
    .feed-body { padding: 2rem; }

    .behold-container { width: 100%; }
    .behold-placeholder {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 2px;
    }
    .behold-placeholder-item {
      aspect-ratio: 1;
      background: var(--gray-1);
      position: relative;
    }
    .behold-placeholder-item::before {
      content: attr(data-n);
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--gray-3);
      letter-spacing: 0.2em;
    }
    .behold-setup {
      margin-top: 1.5rem;
      padding: 1rem 1.5rem;
      border: 1px solid var(--gray-2);
      font-size: 10px;
      color: var(--gray-4);
      letter-spacing: 0.08em;
      line-height: 2;
    }
    .behold-setup a { color: var(--gray-5); text-decoration: none; }
    .behold-setup a:hover { color: var(--white); }
    .behold-setup code {
      background: var(--gray-1);
      padding: 1px 6px;
      color: var(--gray-6);
      font-family: var(--font);
      font-size: 10px;
    }

    /* LINKS */
    .links-body { padding: 0; }
    .link-row {
      display: grid;
      grid-template-columns: 200px 1fr auto;
      align-items: center;
      border-bottom: 1px solid var(--gray-2);
      text-decoration: none;
      transition: background 0.1s;
    }
    .link-row:last-child { border-bottom: none; }
    .link-row:hover { background: var(--gray-1); }
    .link-row-cat {
      padding: 1.5rem 2rem;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--gray-3);
      text-transform: uppercase;
      border-right: 1px solid var(--gray-2);
    }
    .link-row-name {
      padding: 1.5rem 2rem;
      font-size: 12px;
      color: var(--gray-5);
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }
    .link-row:hover .link-row-name { color: var(--white); }
    .link-row-arrow {
      padding: 1.5rem 2rem;
      font-size: 11px;
      color: var(--gray-3);
      transition: color 0.15s, transform 0.15s;
      display: inline-block;
    }
    .link-row:hover .link-row-arrow { color: var(--gray-5); transform: translate(2px, -2px); }



    /* RESPONSIVE */
    @media (max-width: 768px) {
      .hero-title { font-size: clamp(1.6rem, 8vw, 4rem); }
      .hero-meta { grid-template-columns: 1fr 1fr; }
      .hero-meta-item:nth-child(3) { display: none; }
      .section-header { grid-template-columns: 100px 1fr; }
      .section-index { padding: 1rem; font-size: 8px; }
      .section-title { padding: 1rem; font-size: 9px; }
      .link-row { grid-template-columns: 80px 1fr auto; }
      .link-row-cat { padding: 1.2rem 1rem; font-size: 8px; }
      .link-row-name { padding: 1.2rem 1rem; }
      .contact-body { grid-template-columns: 1fr; }
      .contact-left { border-right: none; border-bottom: 1px solid var(--gray-2); padding-right: 0; padding-bottom: 2rem; }
      .contact-right { padding-left: 0; padding-top: 2rem; }
      .feed-body { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <div class="hero" id="home">
    <div class="hero-main">
      <div class="hero-headline">
        <h1 class="hero-title">MIMMOCLST</h1>
        <p class="hero-by">by Alessandro Trevisan</p>
      </div>
    </div>
    <div class="hero-meta">
      <div class="hero-meta-item">
        <div class="meta-label">Based in</div>
        <div class="meta-value">Italy</div>
      </div>
      <div class="hero-meta-item">
        <div class="meta-label">Instagram</div>
        <div class="meta-value">@mimmoclst</div>
      </div>
      <div class="hero-meta-item">
        <div class="meta-label">Status</div>
        <div class="meta-value"><span class="typewriter">online</span></div>
      </div>
    </div>
  </div>

  <!-- FEED -->
  <section id="feed">
    <div class="feed-body" style="padding-top:2rem;">
      <div class="behold-container">
        <behold-widget feed-id="W227RKHs8Ff60GeDhFMW"></behold-widget>
        <script>
          (() => {
            const d=document,s=d.createElement("script");s.type="module";
            s.src="https://w.behold.so/widget.js";d.head.append(s);
          })();
        </script>

      </div>
    </div>
  </section>





</body>
</html>
