<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIMMOCLST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--k:#0a0a0a;--w:#f5f5f5;--b:1px solid #0a0a0a;--g:#888}
    html{scroll-behavior:smooth}
    body{font-family:'Archivo',sans-serif;background:var(--w);color:var(--k);font-size:13px;letter-spacing:.04em}

    header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--w);border-bottom:var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:48px}
    .logo{font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;text-decoration:none;color:var(--k)}
    nav{display:flex}
    nav a{text-decoration:none;color:var(--k);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:0 18px;height:48px;display:flex;align-items:center;border-left:var(--b);transition:background .15s,color .15s}
    nav a:hover,nav a.active{background:var(--k);color:var(--w)}

    .hero{margin-top:48px;border-bottom:var(--b);padding:72px 24px 56px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end}
    .hero-title{font-size:clamp(44px,8vw,96px);font-weight:900;line-height:.92;text-transform:uppercase;letter-spacing:-.02em}
    .hero-title span{display:block}
    .hero-meta p{font-size:12px;color:var(--g);line-height:1.9;text-transform:uppercase;letter-spacing:.08em}
    .hero-meta strong{color:var(--k);font-weight:700}
    .hero-tag{display:inline-block;border:var(--b);padding:4px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:18px}

    .sec-hdr{border-bottom:var(--b);padding:0 24px;height:40px;display:flex;align-items:center;justify-content:space-between}
    .sec-hdr h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em}
    .sec-hdr span{font-size:11px;color:var(--g)}

    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));border-left:var(--b)}
    .item{border-right:var(--b);border-bottom:var(--b);cursor:pointer;position:relative;overflow:hidden;aspect-ratio:3/4;background:#fff}
    .item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease;mix-blend-mode:multiply}
    .item:hover img{transform:scale(1.04)}
    .item-overlay{position:absolute;bottom:0;left:0;right:0;background:var(--w);border-top:var(--b);padding:10px 12px;transform:translateY(100%);transition:transform .25s ease}
    .item:hover .item-overlay{transform:translateY(0)}
    .item-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
    .item-sub{font-size:10px;color:var(--g);margin-top:3px;letter-spacing:.05em}
    .badge{position:absolute;top:10px;left:10px;color:var(--w);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:3px 7px}
    .badge.sold{background:#555}
    .badge.nfs{background:var(--k)}

    .lb{display:none;position:fixed;inset:0;z-index:200;background:rgba(10,10,10,.96);align-items:center;justify-content:center;padding:24px}
    .lb.open{display:flex}
    .lb-inner{position:relative;max-width:520px;width:100%}
    .lb-img{width:100%;max-height:78vh;object-fit:contain;display:block}
    .lb-info{margin-top:14px;border-top:1px solid #333;padding-top:12px;display:flex;align-items:baseline;justify-content:space-between;gap:12px}
    .lb-info h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#fff}
    .lb-status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:3px 8px;border:1px solid #555;color:#aaa;white-space:nowrap}
    .lb-close{position:absolute;top:-40px;right:0;background:none;border:1px solid #555;color:#fff;font-family:'Archivo',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:6px 14px;cursor:pointer}
    .lb-prev,.lb-next{position:absolute;top:40%;transform:translateY(-50%);background:none;border:1px solid #555;color:#fff;font-family:'Archivo',sans-serif;font-size:13px;font-weight:700;padding:8px 14px;cursor:pointer}
    .lb-prev{left:-58px}.lb-next{right:-58px}
    .lb-dots{display:flex;gap:8px;justify-content:center;margin-top:12px}
    .lb-dot{width:6px;height:6px;border-radius:50%;background:#444;cursor:pointer;transition:background .2s}
    .lb-dot.active{background:#fff}

    footer{border-top:var(--b);display:grid;grid-template-columns:1fr 1fr 1fr;height:48px}
    footer div{display:flex;align-items:center;padding:0 24px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--g);border-right:var(--b)}
    footer a{color:var(--k);text-decoration:none}
    footer a:hover{text-decoration:underline}

    @media(max-width:640px){
      .hero{grid-template-columns:1fr;gap:20px;padding:44px 16px 32px}
      .gallery{grid-template-columns:repeat(2,1fr)}
      .lb-prev,.lb-next{display:none}
      footer{grid-template-columns:1fr;height:auto}
      footer div{height:40px;border-right:none;border-bottom:var(--b)}
    }
  </style>
</head>

let currentView = 'all', lbIdx = 0, lbImgIdx = 0;

function build() {
  const gA = document.getElementById('gal-archive');
  const gM = document.getElementById('gal-made');
  gA.innerHTML = ''; gM.innerHTML = '';
  ITEMS.forEach((item, idx) => {
    if (currentView !== 'all' && item.section !== currentView) return;
    const el = document.createElement('div');
    el.className = 'item';
    let badge = '';
    if (item.status === 'SOLD') badge = '<div class="badge sold">Sold</div>';
    else if (item.status === 'NFS') badge = '<div class="badge nfs">NFS</div>';
    el.innerHTML = badge + `<img src="${item.cover}" alt="${item.title}" loading="lazy">
      <div class="item-overlay">
        <div class="item-label">${item.title}</div>
        ${item.desc ? '<div class="item-sub">'+item.desc+'</div>' : ''}
      </div>`;
    el.addEventListener('click', () => openLb(idx));
    (item.section === 'archive' ? gA : gM).appendChild(el);
  });
  document.getElementById('archive-count').textContent = ITEMS.filter(i=>i.section==='archive').length + ' pieces';
  document.getElementById('made-count').textContent    = ITEMS.filter(i=>i.section==='made').length + ' pieces';
}

document.querySelectorAll('nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    currentView = a.dataset.view;
    document.querySelectorAll('nav a').forEach(x=>x.classList.remove('active'));
    a.classList.add('active');
    document.getElementById('archive-section').style.display = currentView==='made' ? 'none' : '';
    document.getElementById('made-section').style.display    = currentView==='archive' ? 'none' : '';
    build();
    if (currentView !== 'all') document.getElementById(currentView==='archive'?'archive-section':'made-section').scrollIntoView({behavior:'smooth'});
  });
});

function openLb(idx) { lbIdx=idx; lbImgIdx=0; updateLb(); document.getElementById('lb').classList.add('open'); }
function updateLb() {
  const item = ITEMS[lbIdx];
  lbImgIdx = Math.min(lbImgIdx, item.images.length-1);
  document.getElementById('lb-img').src = item.images[lbImgIdx];
  document.getElementById('lb-title').textContent = item.title;
  const st = document.getElementById('lb-status');
  st.textContent = item.status; st.style.display = item.status ? '' : 'none';
  const dots = document.getElementById('lb-dots');
  dots.innerHTML = '';
  if (item.images.length > 1) {
    item.images.forEach((_,i) => {
      const d = document.createElement('div');
      d.className = 'lb-dot'+(i===lbImgIdx?' active':'');
      d.addEventListener('click', ()=>{ lbImgIdx=i; updateLb(); });
      dots.appendChild(d);
    });
  }
}

document.getElementById('lb-close').addEventListener('click', ()=>document.getElementById('lb').classList.remove('open'));
document.getElementById('lb-prev').addEventListener('click', ()=>{ lbIdx=(lbIdx-1+ITEMS.length)%ITEMS.length; lbImgIdx=0; updateLb(); });
document.getElementById('lb-next').addEventListener('click', ()=>{ lbIdx=(lbIdx+1)%ITEMS.length; lbImgIdx=0; updateLb(); });
document.getElementById('lb').addEventListener('click', e=>{ if(e.target===document.getElementById('lb')) document.getElementById('lb').classList.remove('open'); });
document.addEventListener('keydown', e=>{
  const lb=document.getElementById('lb');
  if(!lb.classList.contains('open')) return;
  if(e.key==='Escape') lb.classList.remove('open');
  if(e.key==='ArrowLeft')  { lbIdx=(lbIdx-1+ITEMS.length)%ITEMS.length; lbImgIdx=0; updateLb(); }
  if(e.key==='ArrowRight') { lbIdx=(lbIdx+1)%ITEMS.length; lbImgIdx=0; updateLb(); }
});

build();
</script>
